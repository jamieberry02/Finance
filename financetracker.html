<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finance">
<meta name="theme-color" content="#0c0c18">
<title>Finance Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #0f0f1a; color: #e2e8f0; font-family: -apple-system, 'Inter', 'Segoe UI', sans-serif; min-height: 100vh; padding-bottom: env(safe-area-inset-bottom, 20px); }
  input, select, button { font-family: inherit; }
  input[type="number"] { -moz-appearance: textfield; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* Header */
  #header { background: #0c0c18; border-bottom: 1px solid #1a1a2e; padding: 16px 16px 0; position: sticky; top: 0; z-index: 100; padding-top: calc(16px + env(safe-area-inset-top, 0px)); }
  #header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  #logo { width: 36px; height: 36px; background: linear-gradient(135deg,#6366f1,#8b5cf6); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  #title { font-weight: 800; font-size: 18px; color: #f1f5f9; letter-spacing: -0.02em; }
  #subtitle { font-size: 11px; color: #6b7280; margin-top: 1px; }
  #tabs { display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; }
  #tabs::-webkit-scrollbar { display: none; }
  .tab-btn { background: transparent; border: none; border-radius: 10px 10px 0 0; color: #6b7280; padding: 10px 16px; font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; }
  .tab-btn.active { background: #1e1e2e; color: #e2e8f0; font-weight: 700; border-bottom-color: #6366f1; }

  /* Content */
  #content { padding: 20px 16px 0; max-width: 700px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }

  /* Stat cards */
  .stats-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card { background: #1e1e2e; border: 1px solid #2a2a3e; border-radius: 12px; padding: 14px 16px; flex: 1; min-width: 120px; }
  .stat-card.accent { background: linear-gradient(135deg,#6366f1,#8b5cf6); border: none; }
  .stat-card.warn { background: linear-gradient(135deg,#b45309,#92400e); border: none; }
  .stat-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #6b7280; margin-bottom: 5px; }
  .stat-card.accent .stat-label, .stat-card.warn .stat-label { color: rgba(255,255,255,0.7); }
  .stat-value { font-size: 20px; font-weight: 800; color: #e2e8f0; font-family: monospace; }
  .stat-card.accent .stat-value, .stat-card.warn .stat-value { color: #fff; }
  .stat-sub { font-size: 10px; color: #6b7280; margin-top: 3px; }
  .stat-card.accent .stat-sub, .stat-card.warn .stat-sub { color: rgba(255,255,255,0.6); }

  /* Toolbar */
  .toolbar { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
  .view-toggle { display: flex; background: #1e1e2e; border-radius: 8px; padding: 3px; gap: 2px; }
  .view-btn { background: transparent; border: none; border-radius: 6px; color: #6b7280; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .view-btn.active { background: #6366f1; color: #fff; }
  select.filter { background: #1e1e2e; border: 1px solid #2a2a3e; border-radius: 8px; color: #e2e8f0; padding: 7px 10px; font-size: 12px; outline: none; cursor: pointer; }
  .spacer { flex: 1; }
  .btn-primary { background: #6366f1; border: none; border-radius: 8px; color: #fff; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-secondary { background: #374151; border: none; border-radius: 8px; color: #fff; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-sm-green { background: #065f46; border: none; border-radius: 6px; color: #4ade80; padding: 5px 11px; font-size: 12px; font-weight: 700; cursor: pointer; }
  .btn-sm-red { background: #4c0519; border: none; border-radius: 6px; color: #f87171; padding: 5px 11px; font-size: 12px; font-weight: 700; cursor: pointer; }

  /* Form panel */
  .form-panel { background: #1e1e2e; border: 1px solid #6366f1; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
  .form-panel h3 { font-weight: 700; color: #e2e8f0; font-size: 14px; margin-bottom: 12px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .form-grid .full { grid-column: span 2; }
  .form-input { background: #16162a; border: 1px solid #2a2a3e; border-radius: 8px; color: #e2e8f0; padding: 9px 11px; font-size: 13px; outline: none; width: 100%; }
  .form-input::placeholder { color: #4b5563; }
  .form-actions { display: flex; gap: 8px; margin-top: 12px; }
  .checkbox-label { display: flex; align-items: center; gap: 8px; color: #9ca3af; font-size: 13px; cursor: pointer; }

  /* Month accordion */
  .month-list { display: flex; flex-direction: column; gap: 6px; }
  .month-card { background: #1e1e2e; border: 1px solid #2a2a3e; border-radius: 12px; overflow: hidden; }
  .month-header { width: 100%; background: none; border: none; cursor: pointer; padding: 13px 16px; display: flex; align-items: center; gap: 10px; text-align: left; }
  .month-chevron { font-size: 12px; color: #6b7280; flex-shrink: 0; }
  .month-name { font-weight: 700; color: #e2e8f0; font-size: 14px; flex: 1; }
  .month-total { color: #a78bfa; font-weight: 800; font-family: monospace; font-size: 15px; }
  .month-count { color: #6b7280; font-size: 12px; }
  .month-body { border-top: 1px solid #2a2a3e; display: none; }
  .month-body.open { display: block; }
  .vid-row { display: grid; grid-template-columns: 50px 1fr auto; gap: 8px; padding: 10px 16px; border-bottom: 1px solid #1a1a2e; align-items: start; }
  .vid-row:last-of-type { border-bottom: none; }
  .vid-date { color: #6b7280; font-size: 11px; font-family: monospace; padding-top: 2px; }
  .vid-title { font-weight: 600; color: #e2e8f0; font-size: 13px; }
  .vid-client { color: #6b7280; font-size: 11px; margin-top: 2px; }
  .vid-note { color: #6b7280; font-size: 11px; font-style: italic; margin-top: 2px; }
  .vid-price { font-weight: 700; font-family: monospace; font-size: 14px; color: #4ade80; white-space: nowrap; }
  .vid-price.pending { color: #fbbf24; }
  .month-footer { display: flex; justify-content: space-between; padding: 9px 16px; background: #16162a; border-top: 1px solid #2a2a3e; }
  .month-footer-label { color: #9ca3af; font-size: 12px; }
  .month-footer-total { color: #a78bfa; font-weight: 800; font-family: monospace; font-size: 14px; }

  /* Tags */
  .tag { display: inline-block; border-radius: 5px; padding: 2px 8px; font-size: 10px; font-weight: 700; }
  .tag-purple { background: #1e1333; color: #a78bfa; }
  .tag-blue { background: #0c1a3a; color: #60a5fa; }
  .tag-green { background: #052e16; color: #4ade80; }
  .tag-yellow { background: #1a1100; color: #fbbf24; }
  .tag-red { background: #1f0a0a; color: #f87171; }

  /* Table */
  .table-wrap { background: #1e1e2e; border-radius: 12px; border: 1px solid #2a2a3e; overflow: hidden; }
  .table-header { display: grid; padding: 9px 14px; background: #16162a; border-bottom: 1px solid #2a2a3e; }
  .table-header span { font-size: 10px; font-weight: 700; color: #6b7280; letter-spacing: 0.07em; text-transform: uppercase; }
  .table-row { display: grid; padding: 10px 14px; border-bottom: 1px solid #1e1e30; align-items: center; }
  .table-row:last-of-type { border-bottom: none; }
  .table-footer { display: grid; padding: 9px 14px; background: #16162a; border-top: 1px solid #2a2a3e; }
  .del-btn { background: none; border: none; color: #4b5563; cursor: pointer; font-size: 18px; padding: 0; line-height: 1; }

  /* Net worth */
  .nw-hero { background: linear-gradient(135deg,#0f4c35,#064e3b,#0c3a2a); border-radius: 14px; padding: 22px 24px; margin-bottom: 22px; border: 1px solid #065f46; }
  .nw-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #6ee7b7; margin-bottom: 5px; }
  .nw-total { font-size: 40px; font-weight: 900; font-family: monospace; letter-spacing: -0.02em; }
  .nw-total.positive { color: #4ade80; }
  .nw-total.negative { color: #f87171; }
  .nw-row { display: flex; gap: 20px; margin-top: 12px; font-size: 12px; }
  .nw-bar-wrap { margin-top: 12px; background: rgba(0,0,0,0.3); border-radius: 99px; height: 5px; overflow: hidden; }
  .nw-bar { height: 100%; background: linear-gradient(90deg,#4ade80,#34d399); border-radius: 99px; transition: width 0.5s; }
  .nw-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .nw-section-title { font-weight: 700; font-size: 14px; margin-bottom: 10px; }
  .nw-section-title.green { color: #4ade80; }
  .nw-section-title.red { color: #f87171; }
  .nw-section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .nw-item { background: #1e1e2e; border: 1px solid #2a2a3e; border-radius: 10px; padding: 10px 12px; margin-bottom: 7px; display: flex; align-items: center; gap: 8px; }
  .nw-item-info { flex: 1; }
  .nw-item-name { font-weight: 600; color: #e2e8f0; font-size: 12px; margin-bottom: 3px; }
  .nw-value-input { background: #16162a; border: 1px solid #2a2a3e; border-radius: 6px; color: #4ade80; font-family: monospace; font-weight: 700; font-size: 13px; padding: 5px 8px; width: 100px; text-align: right; outline: none; }
  .nw-value-input.red { color: #f87171; }
  .nw-subtotal { background: #16162a; border-radius: 8px; padding: 8px 12px; text-align: right; font-weight: 800; font-family: monospace; font-size: 14px; margin-top: 4px; }
  .nw-form { background: #1e1e2e; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
  .nw-form.green-border { border: 1px solid #4ade80; }
  .nw-form.red-border { border: 1px solid #f87171; }

  /* Expenses breakdown */
  .breakdown { background: #1e1e2e; border: 1px solid #2a2a3e; border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; }
  .breakdown-title { font-size: 10px; font-weight: 700; color: #6b7280; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
  .breakdown-row { margin-bottom: 8px; }
  .breakdown-labels { display: flex; justify-content: space-between; margin-bottom: 3px; font-size: 12px; }
  .breakdown-labels span:first-child { color: #d1d5db; }
  .breakdown-labels span:last-child { color: #9ca3af; font-family: monospace; }
  .breakdown-bar-bg { background: #16162a; border-radius: 99px; height: 4px; overflow: hidden; }
  .breakdown-bar { height: 100%; background: linear-gradient(90deg,#6366f1,#8b5cf6); border-radius: 99px; }

  /* Empty state */
  .empty { padding: 28px; text-align: center; color: #4b5563; font-size: 14px; }

  /* Mobile tweaks */
  @media (max-width: 480px) {
    .nw-cols { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .full { grid-column: span 1; }
    .stats-row { gap: 6px; }
    .stat-value { font-size: 17px; }
  }
</style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <div id="logo">💼</div>
    <div>
      <div id="title">Finance Dashboard</div>
      <div id="subtitle"></div>
    </div>
  </div>
  <div id="tabs">
    <button class="tab-btn active" onclick="switchTab(0)">💰 Earnings</button>
    <button class="tab-btn" onclick="switchTab(1)">📊 Net Worth</button>
    <button class="tab-btn" onclick="switchTab(2)">💸 Expenses</button>
  </div>
</div>

<div id="content">
  <!-- EARNINGS -->
  <div id="sec-0" class="section active">
    <div class="stats-row" id="earn-stats"></div>
    <div class="toolbar">
      <div class="view-toggle">
        <button class="view-btn active" id="vbtn-months" onclick="setView('months')">📅 By Month</button>
        <button class="view-btn" id="vbtn-table" onclick="setView('table')">📋 Table</button>
      </div>
      <select class="filter" id="earn-year-filter" onchange="renderEarnings()">
        <option value="all">All Years</option>
      </select>
      <select class="filter" id="earn-client-filter" onchange="renderEarnings()">
        <option value="all">All Clients</option>
      </select>
      <div class="spacer"></div>
      <button class="btn-primary" onclick="toggleAddVideo()">+ Add</button>
    </div>
    <div id="add-video-form" style="display:none">
      <div class="form-panel">
        <h3>New Video Edit</h3>
        <div class="form-grid">
          <input class="form-input" id="vf-title" placeholder="Video title *">
          <input class="form-input" id="vf-client" placeholder="Client">
          <input class="form-input" id="vf-price" type="number" placeholder="Price (£) *">
          <input class="form-input" id="vf-date" type="date">
          <input class="form-input full" id="vf-notes" placeholder="Notes (optional)">
          <select class="form-input full" id="vf-status" onchange="togglePaidDate('vf')">
            <option value="paid">✅ Paid</option>
            <option value="invoiced">🧾 Invoiced</option>
            <option value="pending_payment">⏳ Pending Payment</option>
            <option value="cancelled">❌ Cancelled</option>
          </select>
          <div class="full" id="vf-paid-date-wrap">
            <input class="form-input" id="vf-paid-date" type="date" placeholder="Date paid" style="width:100%">
          </div>
          <label class="checkbox-label full"><input type="checkbox" id="vf-pending"> Date not confirmed</label>
        </div>
        <div class="form-actions">
          <button class="btn-primary" onclick="addVideo()">Save</button>
          <button class="btn-secondary" onclick="toggleAddVideo()">Cancel</button>
        </div>
      </div>
    </div>
    <div id="earn-view"></div>
  </div>

  <!-- NET WORTH -->
  <div id="sec-1" class="section">
    <div id="nw-hero-wrap"></div>
    <div class="nw-cols">
      <div>
        <div class="nw-section-header">
          <span class="nw-section-title green">Assets</span>
          <button class="btn-sm-green" onclick="toggleAssetForm()">+ Add</button>
        </div>
        <div id="asset-form" style="display:none" class="nw-form green-border">
          <input class="form-input" id="af-label" placeholder="Label *" style="margin-bottom:7px;display:block">
          <select class="form-input" id="af-type" style="margin-bottom:7px;display:block">
            <option>Cash / Savings</option><option>Investments</option><option>Crypto</option>
            <option>Property</option><option>Vehicle</option><option>Business</option><option>Other Asset</option>
          </select>
          <input class="form-input" id="af-value" type="number" placeholder="Value (£) *" style="margin-bottom:7px;display:block">
          <div style="display:flex;gap:6px">
            <button class="btn-sm-green" onclick="addAsset()">Save</button>
            <button class="btn-secondary" style="padding:5px 10px;font-size:12px" onclick="toggleAssetForm()">Cancel</button>
          </div>
        </div>
        <div id="assets-list"></div>
        <div id="assets-total" class="nw-subtotal" style="color:#4ade80"></div>
      </div>
      <div>
        <div class="nw-section-header">
          <span class="nw-section-title red">Liabilities</span>
          <button class="btn-sm-red" onclick="toggleLiabForm()">+ Add</button>
        </div>
        <div id="liab-form" style="display:none" class="nw-form red-border">
          <input class="form-input" id="lf-label" placeholder="Label *" style="margin-bottom:7px;display:block">
          <select class="form-input" id="lf-type" style="margin-bottom:7px;display:block">
            <option>Credit Card</option><option>Student Loan</option><option>Mortgage</option>
            <option>Car Loan</option><option>Personal Loan</option><option>Other Debt</option>
          </select>
          <input class="form-input" id="lf-value" type="number" placeholder="Amount owed (£) *" style="margin-bottom:7px;display:block">
          <div style="display:flex;gap:6px">
            <button class="btn-sm-red" onclick="addLiab()">Save</button>
            <button class="btn-secondary" style="padding:5px 10px;font-size:12px" onclick="toggleLiabForm()">Cancel</button>
          </div>
        </div>
        <div id="liabs-list"></div>
        <div id="liabs-total" class="nw-subtotal" style="color:#f87171"></div>
      </div>
    </div>
  </div>

  <!-- EXPENSES -->
  <div id="sec-2" class="section">
    <div class="stats-row" id="exp-stats"></div>
    <div id="exp-breakdown"></div>
    <div class="toolbar">
      <select class="filter" id="exp-cat-filter" onchange="renderExpenses()">
        <option value="all">All Categories</option>
        <option>Housing</option><option>Food</option><option>Transport</option><option>Software</option>
        <option>Equipment</option><option>Subscriptions</option><option>Health</option>
        <option>Entertainment</option><option>Education</option><option>Other</option>
      </select>
      <div class="spacer"></div>
      <button class="btn-primary" onclick="toggleAddExpense()">+ Add</button>
    </div>
    <div id="add-expense-form" style="display:none">
      <div class="form-panel">
        <h3>New Expense</h3>
        <div class="form-grid">
          <input class="form-input" id="ef-desc" placeholder="Description *">
          <select class="form-input" id="ef-cat">
            <option>Housing</option><option>Food</option><option>Transport</option><option>Software</option>
            <option>Equipment</option><option>Subscriptions</option><option>Health</option>
            <option>Entertainment</option><option>Education</option><option>Other</option>
          </select>
          <input class="form-input" id="ef-amount" type="number" placeholder="Amount (£) *">
          <input class="form-input" id="ef-date" type="date">
          <label class="checkbox-label full"><input type="checkbox" id="ef-recurring"> Recurring monthly</label>
        </div>
        <div class="form-actions">
          <button class="btn-primary" onclick="addExpense()">Save</button>
          <button class="btn-secondary" onclick="toggleAddExpense()">Cancel</button>
        </div>
      </div>
    </div>
    <div id="exp-table"></div>
  </div>
</div>

// ─── STORAGE ───────────────────────────────────────────────────────────────────
function load(key, seed) {
  try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : seed; } catch(e) { return seed; }
}
function save(key, data) {
  try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
}

let videos   = load('fd_videos', SEED_VIDEOS);
let assets   = load('fd_assets', SEED_ASSETS);
let liabs    = load('fd_liabs', SEED_LIABS);
let expenses = load('fd_expenses', SEED_EXPENSES);

// ─── UTILS ─────────────────────────────────────────────────────────────────────
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const now = new Date();
const CY = now.getFullYear(), CM = now.getMonth();

function gbp(n) { return '£' + (n||0).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

const CLIENT_TAG = {
  "Thrive Cart":"tag-purple","Thrive Cart / Piktochart":"tag-purple",
  "Nigel Thomas":"tag-blue","Iman Musa":"tag-yellow","Glen Coco":"tag-green",
  "Traversy":"tag-blue","Instantly":"tag-green","SaaSRise":"tag-yellow",
  "Piktochart":"tag-blue","Aurexis":"tag-purple","Gary Vee":"tag-yellow",
};
function clientTag(c) {
  const cls = CLIENT_TAG[c] || 'tag-blue';
  return `<span class="tag ${cls}">${esc(c||'—')}</span>`;
}
const CAT_TAG = {Housing:"tag-purple",Food:"tag-green",Transport:"tag-blue",Software:"tag-blue",Equipment:"tag-yellow",Subscriptions:"tag-blue",Health:"tag-green",Entertainment:"tag-yellow",Education:"tag-purple",Other:"tag-blue"};

const STATUS_CYCLE = ['paid','invoiced','pending_payment','cancelled'];
const STATUS_LABEL = {paid:'✅ Paid', invoiced:'🧾 Invoiced', pending_payment:'⏳ Pending', cancelled:'❌ Cancelled'};
const STATUS_STYLE = {
  paid:            'background:#052e16;color:#4ade80',
  invoiced:        'background:#0c1a3a;color:#60a5fa',
  pending_payment: 'background:#1a1100;color:#fbbf24',
  cancelled:       'background:#1f0a0a;color:#f87171',
};
function statusBadge(v) {
  const s = v.status || 'paid';
  const paidInfo = s === 'paid' && v.paidDate
    ? `<span style="font-size:10px;color:#6b7280;margin-left:5px">paid ${new Date(v.paidDate).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'})}</span>`
    : '';
  return `<span class="tag" style="${STATUS_STYLE[s]};cursor:pointer;user-select:none" onclick="cycleStatus('${v.id}')" title="Tap to change">${STATUS_LABEL[s]}</span>${paidInfo}`;
}
function togglePaidDate(prefix) {
  const status = document.getElementById(prefix+'-status').value;
  const wrap = document.getElementById(prefix+'-paid-date-wrap');
  if(wrap) wrap.style.display = status === 'paid' ? 'block' : 'none';
}
function cycleStatus(id) {
  videos = videos.map(v => {
    if(v.id !== id) return v;
    const cur = v.status || 'paid';
    const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(cur)+1) % STATUS_CYCLE.length];
    // If cycling to paid and no paidDate, set today
    const paidDate = next === 'paid' ? (v.paidDate || new Date().toISOString().split('T')[0]) : v.paidDate;
    return {...v, status: next, paidDate};
  });
  save('fd_videos', videos);
  renderEarnings();
}

function populateEarnFilters() {
  const years = [...new Set(videos.map(v => new Date(v.date).getFullYear()))].sort((a,b)=>b-a);
  const yf = document.getElementById('earn-year-filter');
  const curY = yf.value;
  yf.innerHTML = '<option value="all">All Years</option>' + years.map(y=>`<option value="${y}"${curY==y?' selected':''}>${y}</option>`).join('');

  const clients = [...new Set(videos.map(v=>v.client).filter(Boolean))].sort();
  const cf = document.getElementById('earn-client-filter');
  const curC = cf.value;
  cf.innerHTML = '<option value="all">All Clients</option>' + clients.map(c=>`<option value="${esc(c)}"${curC===c?' selected':''}>${esc(c)}</option>`).join('');
}

function getFilteredVideos() {
  const fy = document.getElementById('earn-year-filter').value;
  const fc = document.getElementById('earn-client-filter').value;
  return videos.filter(v => {
    const yr = new Date(v.date).getFullYear();
    if(fy!=='all' && yr !== parseInt(fy)) return false;
    if(fc!=='all' && v.client !== fc) return false;
    return true;
  });
}

function renderEarnings() {
  populateEarnFilters();
  const confirmed = videos.filter(v=>!v.pending);
  const pending = videos.filter(v=>v.pending);
  const thisMonthVids = confirmed.filter(v=>{ const d=new Date(v.date); return d.getMonth()===CM&&d.getFullYear()===CY; });
  const thisYearVids  = confirmed.filter(v=>new Date(v.date).getFullYear()===CY);
  const allTime       = confirmed.reduce((s,v)=>s+v.price,0);
  const pendingTotal  = pending.reduce((s,v)=>s+v.price,0);
  const mTotal = thisMonthVids.reduce((s,v)=>s+v.price,0);
  const yTotal = thisYearVids.reduce((s,v)=>s+v.price,0);

  // UK financial year: 6 April to 5 April
  // If current month is Jan-Mar (0-2), FY started April 6 of previous year
  // Otherwise FY started April 6 of current year
  const fyStart = CM < 3 || (CM === 3 && now.getDate() < 6)
    ? new Date(CY-1, 3, 6)   // Apr 6 last year
    : new Date(CY,   3, 6);   // Apr 6 this year
  const fyEnd   = new Date(fyStart.getFullYear()+1, 3, 5, 23, 59, 59);
  const fyStartYear = fyStart.getFullYear();
  const fyEndYear   = fyEnd.getFullYear();
  const fyVids  = confirmed.filter(v=>{ const d=new Date(v.date); return d>=fyStart && d<=fyEnd; });
  const fyTotal = fyVids.reduce((s,v)=>s+v.price,0);

  document.getElementById('earn-stats').innerHTML = `
    <div class="stat-card accent"><div class="stat-label">All Time (confirmed)</div><div class="stat-value">${gbp(allTime)}</div><div class="stat-sub">${confirmed.length} videos</div></div>
    <div class="stat-card"><div class="stat-label">${MONTHS[CM]} ${CY}</div><div class="stat-value">${gbp(mTotal)}</div><div class="stat-sub">${thisMonthVids.length} videos</div></div>
    <div class="stat-card" style="background:linear-gradient(135deg,#0f4c35,#064e3b);border:none"><div class="stat-label" style="color:rgba(255,255,255,0.7)">Tax Year ${fyStartYear}/${String(fyEndYear).slice(2)}</div><div class="stat-value" style="color:#4ade80">${gbp(fyTotal)}</div><div class="stat-sub" style="color:rgba(255,255,255,0.6)">${fyVids.length} videos · 6 Apr ${fyStartYear}–5 Apr ${fyEndYear}</div></div>
    ${pendingTotal>0?`<div class="stat-card warn"><div class="stat-label">Pending / TBC</div><div class="stat-value">${gbp(pendingTotal)}</div><div class="stat-sub">${pending.length} jobs</div></div>`:''}
  `;

  const fv = getFilteredVideos().slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  const el = document.getElementById('earn-view');

  if(earnView==='months') {
    // Group
    const map = {};
    fv.forEach(v => {
      const d=new Date(v.date), key=`${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`;
      if(!map[key]) map[key]={year:d.getFullYear(),month:d.getMonth(),vids:[]};
      map[key].vids.push(v);
    });
    const groups = Object.values(map).sort((a,b)=>b.year!==a.year?b.year-a.year:b.month-a.month);
    el.innerHTML = '<div class="month-list">' + groups.map(g => {
      const total = g.vids.reduce((s,v)=>s+v.price,0);
      const confTotal = g.vids.filter(v=>!v.pending).reduce((s,v)=>s+v.price,0);
      const hasPending = g.vids.some(v=>v.pending);
      const key = `${g.year}-${g.month}`;
      const rows = g.vids.slice().sort((a,b)=>new Date(a.date)-new Date(b.date)).map(v => {
        const dStr = new Date(v.date).toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit'});
        const priceStr = (v.currency==='USD'?'$':'£') + v.price.toFixed(2);
        return `<div class="vid-row">
          <div class="vid-date">${dStr}</div>
          <div>
            <div class="vid-title">${esc(v.title)}</div>
            ${v.client&&v.client!=='Unknown'?`<div class="vid-client">${esc(v.client)}</div>`:''}
            <div style="margin-top:4px;display:flex;gap:5px;align-items:center;flex-wrap:wrap">
              ${statusBadge(v)}
              ${v.pending&&(v.status||'paid')!=='paid'?'<span class="tag tag-yellow">date TBC</span>':''}
            </div>
            ${v.notes?`<div class="vid-note">${esc(v.notes)}</div>`:''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            <span class="vid-price${v.pending?' pending':''}">${priceStr}</span>
            <button class="del-btn" onclick="deleteVideo('${v.id}')" style="font-size:15px">×</button>
          </div>
        </div>`;
      }).join('');
      return `<div class="month-card">
        <button class="month-header" onclick="toggleMonth('${key}')">
          <span class="month-chevron" id="chev-${key}">▸</span>
          <span class="month-name">${MONTHS[g.month]} ${g.year}</span>
          ${hasPending?'<span class="tag tag-yellow" style="font-size:10px">pending</span>':''}
          <span class="month-total">${gbp(total)}</span>
          <span class="month-count">${g.vids.length}v</span>
        </button>
        <div class="month-body" id="mb-${key}">
          ${rows}
          <div class="month-footer">
            <span class="month-footer-label">${hasPending?`Confirmed: ${gbp(confTotal)} · Incl. pending:`:'Total:'}</span>
            <span class="month-footer-total">${gbp(total)}</span>
          </div>
        </div>
      </div>`;
    }).join('') + '</div>';
  } else {
    // Table
    if(fv.length===0){ el.innerHTML='<div class="empty">No videos for this filter</div>'; return; }
    const rows = fv.map(v => {
      const dStr = new Date(v.date).toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'2-digit'});
      const priceStr = (v.currency==='USD'?'$':'£') + v.price.toFixed(2);
      return `<div class="table-row" style="grid-template-columns:55px 1fr auto auto 28px;gap:8px;align-items:start">
        <span style="color:#6b7280;font-size:11px;font-family:monospace;padding-top:2px">${dStr}</span>
        <div>
          <span style="font-weight:600;color:#e2e8f0;font-size:13px">${esc(v.title)}</span>
          <div style="margin-top:4px;display:flex;gap:5px;flex-wrap:wrap">
            ${statusBadge(v)}
            ${v.pending&&(v.status||'paid')!=='paid'?'<span class="tag tag-yellow">date TBC</span>':''}
          </div>
          ${v.notes?`<div style="font-size:11px;color:#6b7280;font-style:italic;margin-top:2px">${esc(v.notes)}</div>`:''}
        </div>
        ${clientTag(v.client)}
        <span style="color:${v.pending?'#fbbf24':'#4ade80'};font-weight:700;font-family:monospace;font-size:13px;white-space:nowrap">${priceStr}</span>
        <button class="del-btn" onclick="deleteVideo('${v.id}')">×</button>
      </div>`;
    }).join('');
    const filtTotal = fv.reduce((s,v)=>s+v.price,0);
    el.innerHTML = `<div class="table-wrap">
      <div class="table-header" style="grid-template-columns:55px 1fr auto auto 28px;gap:8px">
        <span>Date</span><span>Title</span><span>Client</span><span>Price</span><span></span>
      </div>
      ${rows}
      <div class="table-footer" style="grid-template-columns:55px 1fr auto auto 28px;gap:8px">
        <span style="grid-column:span 3;color:#9ca3af;font-size:12px;font-weight:600">${fv.length} videos</span>
        <span style="color:#a78bfa;font-weight:800;font-family:monospace;font-size:14px">${gbp(filtTotal)}</span>
      </div>
    </div>`;
  }
}

}

}

// ─── NET WORTH ─────────────────────────────────────────────────────────────────
function renderNetWorth() {
  const ta = assets.reduce((s,a)=>s+Number(a.value),0);
  const tl = liabs.reduce((s,l)=>s+Number(l.value),0);
  const nw = ta - tl;
  const pct = ta>0 ? Math.max(0,Math.min(100,(nw/ta)*100)) : 0;

  document.getElementById('nw-hero-wrap').innerHTML = `
    <div class="nw-hero">
      <div class="nw-label">Total Net Worth</div>
      <div class="nw-total ${nw>=0?'positive':'negative'}">${gbp(nw)}</div>
      <div class="nw-row">
        <span><span style="color:#6ee7b7;font-weight:700;font-size:11px">ASSETS </span><span style="color:#d1fae5;font-weight:700">${gbp(ta)}</span></span>
        <span><span style="color:#fca5a5;font-weight:700;font-size:11px">LIABILITIES </span><span style="color:#fca5a5;font-weight:700">−${gbp(tl)}</span></span>
      </div>
      <div class="nw-bar-wrap"><div class="nw-bar" style="width:${pct}%"></div></div>
    </div>`;

  const typeTag = {
    "Cash / Savings":"tag-green","Investments":"tag-blue","Crypto":"tag-yellow",
    "Property":"tag-purple","Vehicle":"tag-blue","Business":"tag-green","Other Asset":"tag-blue"
  };

  document.getElementById('assets-list').innerHTML = assets.map(a=>`
    <div class="nw-item">
      <div class="nw-item-info">
        <div class="nw-item-name">${esc(a.label)}</div>
        <span class="tag ${typeTag[a.type]||'tag-blue'}">${esc(a.type)}</span>
      </div>
      <input class="nw-value-input" type="number" value="${a.value}" onchange="updateAsset(${a.id},this.value)">
      <button class="del-btn" onclick="deleteAsset(${a.id})">×</button>
    </div>`).join('');
  document.getElementById('assets-total').innerHTML = `<span style="color:#6b7280;font-size:11px">Total assets </span>${gbp(ta)}`;
  document.getElementById('assets-total').style.color='#4ade80';

  document.getElementById('liabs-list').innerHTML = liabs.map(l=>`
    <div class="nw-item">
      <div class="nw-item-info">
        <div class="nw-item-name">${esc(l.label)}</div>
        <span class="tag tag-red">${esc(l.type)}</span>
      </div>
      <input class="nw-value-input red" type="number" value="${l.value}" onchange="updateLiab(${l.id},this.value)">
      <button class="del-btn" onclick="deleteLiab(${l.id})">×</button>
    </div>`).join('');
  document.getElementById('liabs-total').innerHTML = `<span style="color:#6b7280;font-size:11px">Total liabilities </span>−${gbp(tl)}`;
  document.getElementById('liabs-total').style.color='#f87171';
}

  const label=document.getElementById('lf-label').value.trim(), value=parseFloat(document.getElementById('lf-value').value);
  if(!label||isNaN(value)) return;
  liabs.push({id:Date.now(),label,type:document.getElementById('lf-type').value,value});
  save('fd_liabs',liabs);
  document.getElementById('lf-label').value=''; document.getElementById('lf-value').value='';
  document.getElementById('liab-form').style.display='none';
  renderNetWorth();
}
function updateAsset(id,val) { assets=assets.map(a=>a.id===id?{...a,value:parseFloat(val)||0}:a); save('fd_assets',assets); renderNetWorth(); }
function updateLiab(id,val)  { liabs=liabs.map(l=>l.id===id?{...l,value:parseFloat(val)||0}:l); save('fd_liabs',liabs); renderNetWorth(); }
function deleteAsset(id) { assets=assets.filter(a=>a.id!==id); save('fd_assets',assets); renderNetWorth(); }
function deleteLiab(id)  { liabs=liabs.filter(l=>l.id!==id); save('fd_liabs',liabs); renderNetWorth(); }

// ─── EXPENSES ──────────────────────────────────────────────────────────────────
function renderExpenses() {
  const allTime = expenses.reduce((s,e)=>s+Number(e.amount),0);
  const thisMonth = expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===CM&&d.getFullYear()===CY;}).reduce((s,e)=>s+Number(e.amount),0);
  const recurring = expenses.filter(e=>e.recurring).reduce((s,e)=>s+Number(e.amount),0);

  document.getElementById('exp-stats').innerHTML = `
    <div class="stat-card accent"><div class="stat-label">This Month</div><div class="stat-value">${gbp(thisMonth)}</div></div>
    <div class="stat-card"><div class="stat-label">All Time</div><div class="stat-value">${gbp(allTime)}</div></div>
    <div class="stat-card"><div class="stat-label">Recurring / mo</div><div class="stat-value">${gbp(recurring)}</div></div>
  `;

  // Breakdown
  const map={};
  expenses.forEach(e=>{map[e.category]=(map[e.category]||0)+Number(e.amount);});
  const cats = Object.entries(map).sort((a,b)=>b[1]-a[1]);
  document.getElementById('exp-breakdown').innerHTML = cats.length===0 ? '' : `
    <div class="breakdown">
      <div class="breakdown-title">Spending Breakdown</div>
      ${cats.map(([cat,amt])=>{
        const pct=allTime>0?Math.round((amt/allTime)*100):0;
        return `<div class="breakdown-row">
          <div class="breakdown-labels"><span>${esc(cat)}</span><span>${gbp(amt)} (${pct}%)</span></div>
          <div class="breakdown-bar-bg"><div class="breakdown-bar" style="width:${pct}%"></div></div>
        </div>`;
      }).join('')}
    </div>`;

  const fc = document.getElementById('exp-cat-filter').value;
  const filt = fc==='all' ? expenses : expenses.filter(e=>e.category===fc);
  const sorted = filt.slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  const filtTotal = sorted.reduce((s,e)=>s+Number(e.amount),0);

  if(sorted.length===0){ document.getElementById('exp-table').innerHTML='<div class="empty">No expenses yet</div>'; return; }

  document.getElementById('exp-table').innerHTML = `<div class="table-wrap">
    <div class="table-header" style="grid-template-columns:1fr auto 70px 80px 28px;gap:8px">
      <span>Description</span><span>Category</span><span>Date</span><span>Amount</span><span></span>
    </div>
    ${sorted.map(e=>`
    <div class="table-row" style="grid-template-columns:1fr auto 70px 80px 28px;gap:8px;align-items:center">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-weight:600;color:#e2e8f0;font-size:13px">${esc(e.desc)}</span>
        ${e.recurring?'<span style="font-size:10px;background:#1e3a5f;color:#60a5fa;border-radius:4px;padding:1px 5px;font-weight:600">↺</span>':''}
      </div>
      <span class="tag ${CAT_TAG[e.category]||'tag-blue'}">${esc(e.category)}</span>
      <span style="color:#6b7280;font-size:12px">${new Date(e.date).toLocaleDateString('en-GB',{day:'2-digit',month:'short'})}</span>
      <span style="color:#f87171;font-weight:700;font-family:monospace;font-size:13px">−${gbp(e.amount)}</span>
      <button class="del-btn" onclick="deleteExpense(${e.id})">×</button>
    </div>`).join('')}
    <div class="table-footer" style="grid-template-columns:1fr auto 70px 80px 28px;gap:8px">
      <span style="grid-column:span 3;color:#9ca3af;font-size:12px;font-weight:600">${sorted.length} items</span>
      <span style="color:#f87171;font-weight:800;font-family:monospace;font-size:14px">−${gbp(filtTotal)}</span>
    </div>
  </div>`;
}

function toggleAddExpense() { const f=document.getElementById('add-expense-form'); f.style.display=f.style.display==='none'?'block':'none'; }
function addExpense() {
  const desc=document.getElementById('ef-desc').value.trim(), amount=parseFloat(document.getElementById('ef-amount').value);
  if(!desc||isNaN(amount)) return;
  expenses.push({id:Date.now(),desc,category:document.getElementById('ef-cat').value,amount,date:document.getElementById('ef-date').value,recurring:document.getElementById('ef-recurring').checked});
  save('fd_expenses',expenses);
  document.getElementById('ef-desc').value=''; document.getElementById('ef-amount').value='';
  document.getElementById('ef-recurring').checked=false;
  document.getElementById('add-expense-form').style.display='none';
  renderExpenses();
}
function deleteExpense(id) { expenses=expenses.filter(e=>e.id!==id); save('fd_expenses',expenses); renderExpenses(); }

// ─── INIT ──────────────────────────────────────────────────────────────────────
renderEarnings();
</script>
